<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Flowtone AI Assistant — Design Mockup</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #030712;
    --card: rgba(17, 24, 39, 0.7);
    --card-border: rgba(55, 65, 81, 0.5);
    --text: #f9fafb;
    --text-muted: #9ca3af;
    --text-dim: #6b7280;
    --indigo: #6366f1;
    --teal: #14b8a6;
    --green: #22c55e;
    --red: #ef4444;
    --amber: #f59e0b;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    max-width: 430px;
    margin: 0 auto;
    height: 100dvh;
    overflow: hidden;
    position: relative;
  }

  /* ─── Fake app background ─── */
  .app-bg {
    position: absolute;
    inset: 0;
    background: var(--bg);
    padding: 60px 16px 80px;
    overflow: auto;
    transition: filter 0.4s ease, transform 0.4s ease;
  }
  .app-bg.blurred {
    filter: blur(8px) brightness(0.4);
    transform: scale(0.97);
  }
  .app-bg h2 { font-size: 18px; font-weight: 600; margin-bottom: 16px; }
  .app-bg .fake-card {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 12px;
  }
  .app-bg .fake-card .label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.05em; }
  .app-bg .fake-card .value { font-size: 24px; font-weight: 700; margin-top: 4px; }
  .app-bg .fake-card .sub { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

  /* ─── Floating trigger button ─── */
  .trigger-btn {
    position: fixed;
    bottom: 90px;
    right: 20px;
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    border: none;
    cursor: pointer;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 24px rgba(99, 102, 241, 0.4);
    transition: all 0.3s ease;
  }
  .trigger-btn:hover { transform: scale(1.08); }
  .trigger-btn.hidden { opacity: 0; pointer-events: none; transform: scale(0.5); }
  .trigger-btn svg { width: 26px; height: 26px; color: white; }

  /* ─── AI Overlay ─── */
  .ai-overlay {
    position: fixed;
    inset: 0;
    z-index: 200;
    display: flex;
    flex-direction: column;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.35s ease;
  }
  .ai-overlay.open {
    opacity: 1;
    pointer-events: all;
  }

  /* Animated glow border */
  .glow-border {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 201;
    opacity: 0;
    transition: opacity 0.5s ease;
  }
  .glow-border.active { opacity: 1; }
  .glow-border::before,
  .glow-border::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 0;
  }
  .glow-border::before {
    border: 2px solid transparent;
    background: linear-gradient(var(--bg), var(--bg)) padding-box,
                conic-gradient(from var(--glow-angle, 0deg), #6366f1, #8b5cf6, #14b8a6, #6366f1) border-box;
    animation: glowSpin 3s linear infinite;
    mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    mask-composite: exclude;
    -webkit-mask-composite: xor;
    padding: 2px;
  }
  .glow-border::after {
    background: conic-gradient(from var(--glow-angle, 0deg),
      rgba(99,102,241,0.15), rgba(139,92,246,0.1), rgba(20,184,166,0.15), rgba(99,102,241,0.15));
    animation: glowSpin 3s linear infinite;
    filter: blur(20px);
  }

  @property --glow-angle {
    syntax: '<angle>';
    initial-value: 0deg;
    inherits: false;
  }
  @keyframes glowSpin {
    to { --glow-angle: 360deg; }
  }

  /* Overlay background */
  .ai-bg {
    position: absolute;
    inset: 0;
    background: rgba(3, 7, 18, 0.92);
    backdrop-filter: blur(40px);
    -webkit-backdrop-filter: blur(40px);
  }

  /* AI content area */
  .ai-content {
    position: relative;
    z-index: 202;
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 16px;
    overflow: hidden;
  }

  /* Top bar */
  .ai-topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 0 16px;
    flex-shrink: 0;
  }
  .ai-topbar .title {
    font-size: 15px;
    font-weight: 600;
    background: linear-gradient(135deg, #a5b4fc, #c4b5fd);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .ai-topbar .close-btn {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: rgba(55, 65, 81, 0.5);
    border: 1px solid rgba(75, 85, 99, 0.4);
    color: var(--text-muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    transition: all 0.2s;
  }
  .ai-topbar .close-btn:hover { background: rgba(75, 85, 99, 0.6); color: white; }

  /* Messages area */
  .ai-messages {
    flex: 1;
    overflow-y: auto;
    padding-bottom: 16px;
    scroll-behavior: smooth;
  }
  .ai-messages::-webkit-scrollbar { display: none; }

  /* Message bubbles */
  .msg {
    margin-bottom: 16px;
    animation: msgIn 0.35s ease;
  }
  @keyframes msgIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg.ai .bubble {
    font-size: 14px;
    line-height: 1.5;
    color: var(--text);
  }
  .msg.ai .label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #818cf8;
    margin-bottom: 6px;
    font-weight: 600;
  }
  .msg.user {
    display: flex;
    justify-content: flex-end;
  }
  .msg.user .bubble {
    background: rgba(99, 102, 241, 0.15);
    border: 1px solid rgba(99, 102, 241, 0.25);
    border-radius: 16px 16px 4px 16px;
    padding: 10px 14px;
    font-size: 14px;
    max-width: 80%;
    color: #c7d2fe;
  }

  /* ─── Rich response cards ─── */
  .rich-card {
    background: rgba(17, 24, 39, 0.8);
    border: 1px solid rgba(55, 65, 81, 0.6);
    border-radius: 16px;
    padding: 16px;
    margin-top: 10px;
    margin-bottom: 4px;
  }

  /* Money summary card */
  .money-card .amount {
    font-size: 32px;
    font-weight: 700;
    background: linear-gradient(135deg, #22c55e, #4ade80);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .money-card .period {
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 4px;
  }
  .money-card .breakdown {
    display: flex;
    gap: 12px;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid rgba(55, 65, 81, 0.4);
  }
  .money-card .breakdown .item {
    flex: 1;
  }
  .money-card .breakdown .item .val {
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
  }
  .money-card .breakdown .item .lbl {
    font-size: 10px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-top: 2px;
  }

  /* Mini bar chart */
  .mini-chart {
    display: flex;
    align-items: flex-end;
    gap: 6px;
    height: 60px;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid rgba(55, 65, 81, 0.4);
  }
  .mini-chart .bar-group {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .mini-chart .bar {
    width: 100%;
    border-radius: 4px 4px 0 0;
    background: linear-gradient(to top, rgba(99, 102, 241, 0.6), rgba(139, 92, 246, 0.8));
    transition: height 0.6s ease;
  }
  .mini-chart .bar-label {
    font-size: 9px;
    color: var(--text-dim);
  }

  /* Schedule card */
  .schedule-card .event-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid rgba(55, 65, 81, 0.3);
  }
  .schedule-card .event-row:last-child { border-bottom: none; }
  .schedule-card .time-col {
    width: 48px;
    flex-shrink: 0;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
  }
  .schedule-card .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .schedule-card .event-info {
    flex: 1;
    min-width: 0;
  }
  .schedule-card .event-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .schedule-card .event-sub {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 1px;
  }
  .schedule-card .event-fee {
    font-size: 13px;
    font-weight: 600;
    color: var(--green);
    flex-shrink: 0;
  }

  /* Overdue card */
  .overdue-card {
    border-color: rgba(239, 68, 68, 0.3);
  }
  .overdue-card .header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
  }
  .overdue-card .header .icon {
    width: 20px; height: 20px;
    color: var(--red);
  }
  .overdue-card .header .text {
    font-size: 13px;
    font-weight: 600;
    color: #fca5a5;
  }
  .overdue-card .overdue-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 0;
    border-bottom: 1px solid rgba(55, 65, 81, 0.3);
  }
  .overdue-card .overdue-row:last-child { border-bottom: none; }
  .overdue-card .overdue-name {
    font-size: 13px;
    color: var(--text);
  }
  .overdue-card .overdue-days {
    font-size: 11px;
    color: #fca5a5;
  }
  .overdue-card .overdue-amount {
    font-size: 13px;
    font-weight: 600;
    color: var(--red);
  }
  .overdue-card .action-row {
    margin-top: 10px;
    display: flex;
    gap: 8px;
  }
  .overdue-card .action-btn {
    flex: 1;
    padding: 8px;
    border-radius: 10px;
    border: none;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .overdue-card .action-btn.primary {
    background: rgba(239, 68, 68, 0.15);
    color: #fca5a5;
    border: 1px solid rgba(239, 68, 68, 0.25);
  }
  .overdue-card .action-btn.primary:hover { background: rgba(239, 68, 68, 0.25); }

  /* Proactive brief card */
  .brief-card .greeting {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .brief-card .date-line {
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 14px;
  }
  .brief-card .stat-row {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
  }
  .brief-card .stat-pill {
    flex: 1;
    background: rgba(31, 41, 55, 0.8);
    border: 1px solid var(--card-border);
    border-radius: 12px;
    padding: 10px;
    text-align: center;
  }
  .brief-card .stat-pill .num {
    font-size: 20px;
    font-weight: 700;
  }
  .brief-card .stat-pill .lbl {
    font-size: 9px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-top: 2px;
  }
  .brief-card .stat-pill.warn { border-color: rgba(239, 68, 68, 0.3); }
  .brief-card .stat-pill.warn .num { color: #fca5a5; }

  /* Thinking indicator */
  .thinking {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 0;
    margin-bottom: 16px;
  }
  .thinking .dots {
    display: flex;
    gap: 4px;
  }
  .thinking .dots span {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #818cf8;
    animation: dotPulse 1.4s ease-in-out infinite;
  }
  .thinking .dots span:nth-child(2) { animation-delay: 0.2s; }
  .thinking .dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes dotPulse {
    0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
    40% { opacity: 1; transform: scale(1); }
  }
  .thinking .text {
    font-size: 12px;
    color: #818cf8;
    font-style: italic;
  }

  /* ─── Input area ─── */
  .ai-input-area {
    flex-shrink: 0;
    padding: 12px 0;
    padding-bottom: max(12px, env(safe-area-inset-bottom));
  }
  .ai-input-row {
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(31, 41, 55, 0.6);
    border: 1px solid rgba(55, 65, 81, 0.5);
    border-radius: 24px;
    padding: 6px 6px 6px 16px;
  }
  .ai-input-row input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-size: 14px;
  }
  .ai-input-row input::placeholder { color: var(--text-dim); }

  .mic-btn, .send-btn {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .mic-btn {
    background: rgba(55, 65, 81, 0.5);
    color: var(--text-muted);
  }
  .mic-btn:hover { background: rgba(75, 85, 99, 0.6); color: white; }
  .mic-btn.listening {
    background: rgba(239, 68, 68, 0.2);
    color: #fca5a5;
    animation: micPulse 1.5s ease-in-out infinite;
  }
  @keyframes micPulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.3); }
    50% { box-shadow: 0 0 0 8px rgba(239, 68, 68, 0); }
  }

  .send-btn {
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    color: white;
  }
  .send-btn:hover { transform: scale(1.05); }
  .send-btn svg { width: 18px; height: 18px; }

  /* ─── Voice mode overlay ─── */
  .voice-mode {
    position: absolute;
    inset: 0;
    z-index: 210;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(3, 7, 18, 0.97);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
  }
  .voice-mode.active { opacity: 1; pointer-events: all; }

  .voice-orb {
    width: 160px;
    height: 160px;
    border-radius: 50%;
    background: radial-gradient(circle at 40% 40%, #818cf8, #6366f1, #4f46e5);
    position: relative;
    animation: orbFloat 3s ease-in-out infinite;
  }
  .voice-orb::after {
    content: '';
    position: absolute;
    inset: -20px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(99, 102, 241, 0.3), transparent 70%);
    animation: orbGlow 2s ease-in-out infinite alternate;
  }
  @keyframes orbFloat {
    0%, 100% { transform: translateY(0) scale(1); }
    50% { transform: translateY(-8px) scale(1.03); }
  }
  @keyframes orbGlow {
    from { opacity: 0.5; transform: scale(1); }
    to { opacity: 1; transform: scale(1.15); }
  }
  .voice-orb.speaking {
    animation: orbSpeak 0.3s ease-in-out infinite alternate;
  }
  @keyframes orbSpeak {
    from { transform: scale(1); }
    to { transform: scale(1.08); }
  }

  .voice-text {
    margin-top: 32px;
    font-size: 14px;
    color: var(--text-muted);
    text-align: center;
    max-width: 260px;
    line-height: 1.5;
  }
  .voice-transcript {
    margin-top: 16px;
    font-size: 18px;
    font-weight: 500;
    color: var(--text);
    text-align: center;
    max-width: 300px;
    min-height: 28px;
  }
  .voice-cancel {
    margin-top: 40px;
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: rgba(55, 65, 81, 0.5);
    border: 1px solid rgba(75, 85, 99, 0.4);
    color: var(--text-muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
  }

  /* ─── Demo nav ─── */
  .demo-nav {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 430px;
    background: rgba(17, 24, 39, 0.95);
    border-top: 1px solid rgba(55, 65, 81, 0.5);
    backdrop-filter: blur(20px);
    padding: 8px 16px;
    padding-bottom: max(8px, env(safe-area-inset-bottom));
    z-index: 50;
    display: flex;
    justify-content: center;
    gap: 24px;
  }
  .demo-nav button {
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 8px;
    transition: all 0.2s;
  }
  .demo-nav button:hover, .demo-nav button.active {
    color: var(--indigo);
    background: rgba(99, 102, 241, 0.1);
  }

  /* ─── Suggest chips ─── */
  .suggest-chips {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-top: 8px;
    margin-bottom: 12px;
  }
  .suggest-chips button {
    background: rgba(99, 102, 241, 0.08);
    border: 1px solid rgba(99, 102, 241, 0.2);
    border-radius: 20px;
    padding: 6px 12px;
    font-size: 12px;
    color: #a5b4fc;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .suggest-chips button:hover {
    background: rgba(99, 102, 241, 0.15);
    border-color: rgba(99, 102, 241, 0.35);
  }
</style>
</head>
<body>

<!-- Fake app background -->
<div class="app-bg" id="appBg">
  <h2>Dashboard</h2>
  <div class="fake-card">
    <div class="label">This Week</div>
    <div class="value">7 Events</div>
    <div class="sub">3 lessons, 2 gigs, 1 rehearsal, 1 session</div>
  </div>
  <div class="fake-card">
    <div class="label">Outstanding</div>
    <div class="value" style="color:#f59e0b">£3,245</div>
    <div class="sub">4 invoices awaiting payment</div>
  </div>
  <div class="fake-card">
    <div class="label">Next Up</div>
    <div class="value" style="font-size:16px">Sophie Williams — Piano</div>
    <div class="sub">Today 10:00 — 11:00</div>
  </div>
</div>

<!-- Floating trigger -->
<button class="trigger-btn" id="triggerBtn" onclick="openAI()">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/>
    <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
    <line x1="12" y1="19" x2="12" y2="22"/>
  </svg>
</button>

<!-- AI Overlay -->
<div class="ai-overlay" id="aiOverlay">
  <div class="ai-bg"></div>
  <div class="glow-border" id="glowBorder"></div>

  <div class="ai-content">
    <div class="ai-topbar">
      <div class="title">Flowtone AI</div>
      <button class="close-btn" onclick="closeAI()">&times;</button>
    </div>

    <div class="ai-messages" id="aiMessages"></div>

    <div class="ai-input-area">
      <div class="ai-input-row">
        <input type="text" id="aiInput" placeholder="Ask me anything..." onkeydown="if(event.key==='Enter')handleSend()">
        <button class="mic-btn" id="micBtn" onclick="toggleVoice()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
            <line x1="12" y1="19" x2="12" y2="22"/>
          </svg>
        </button>
        <button class="send-btn" onclick="handleSend()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Voice mode -->
  <div class="voice-mode" id="voiceMode">
    <div class="voice-orb" id="voiceOrb"></div>
    <div class="voice-text">Listening...</div>
    <div class="voice-transcript" id="voiceTranscript"></div>
    <button class="voice-cancel" onclick="closeVoice()">&times;</button>
  </div>
</div>

<!-- Demo navigation -->
<div class="demo-nav">
  <button class="active" onclick="runDemo('brief')">Brief</button>
  <button onclick="runDemo('earnings')">Earnings</button>
  <button onclick="runDemo('schedule')">Schedule</button>
  <button onclick="runDemo('overdue')">Overdue</button>
  <button onclick="runDemo('voice')">Voice</button>
</div>

<script>
  const overlay = document.getElementById('aiOverlay');
  const appBg = document.getElementById('appBg');
  const messages = document.getElementById('aiMessages');
  const triggerBtn = document.getElementById('triggerBtn');
  const glowBorder = document.getElementById('glowBorder');
  const voiceMode = document.getElementById('voiceMode');
  const aiInput = document.getElementById('aiInput');

  function openAI() {
    overlay.classList.add('open');
    appBg.classList.add('blurred');
    triggerBtn.classList.add('hidden');
    aiInput.focus();
  }

  function closeAI() {
    overlay.classList.remove('open');
    appBg.classList.remove('blurred');
    triggerBtn.classList.remove('hidden');
    glowBorder.classList.remove('active');
    voiceMode.classList.remove('active');
  }

  function addMsg(type, html, delay) {
    return new Promise(resolve => {
      setTimeout(() => {
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        div.innerHTML = `<div class="bubble">${html}</div>`;
        messages.appendChild(div);
        messages.scrollTop = messages.scrollHeight;
        resolve();
      }, delay || 0);
    });
  }

  function showThinking(duration) {
    return new Promise(resolve => {
      glowBorder.classList.add('active');
      const div = document.createElement('div');
      div.className = 'thinking';
      div.innerHTML = '<div class="dots"><span></span><span></span><span></span></div><span class="text">Thinking...</span>';
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
      setTimeout(() => {
        div.remove();
        glowBorder.classList.remove('active');
        resolve();
      }, duration);
    });
  }

  function clearMessages() {
    messages.innerHTML = '';
  }

  function handleSend() {
    const val = aiInput.value.trim();
    if (!val) return;
    addMsg('user', val);
    aiInput.value = '';
  }

  function toggleVoice() {
    voiceMode.classList.add('active');
    document.getElementById('voiceOrb').classList.add('speaking');
    // Simulate transcript
    const transcript = document.getElementById('voiceTranscript');
    const words = ["How", "How much", "How much did", "How much did I", "How much did I earn", "How much did I earn this", "How much did I earn this month?"];
    let i = 0;
    const interval = setInterval(() => {
      transcript.textContent = words[i] || words[words.length - 1];
      i++;
      if (i > words.length) {
        clearInterval(interval);
        setTimeout(() => {
          closeVoice();
          runDemo('earnings');
        }, 600);
      }
    }, 350);
  }

  function closeVoice() {
    voiceMode.classList.remove('active');
    document.getElementById('voiceOrb').classList.remove('speaking');
    document.getElementById('voiceTranscript').textContent = '';
  }

  // Demo scenarios
  async function runDemo(type) {
    clearMessages();
    if (!overlay.classList.contains('open')) openAI();

    document.querySelectorAll('.demo-nav button').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');

    if (type === 'brief') {
      await addMsg('ai', '<div class="label">Flowtone AI</div>');
      await showThinking(800);
      await addMsg('ai', `
        <div class="rich-card brief-card">
          <div class="greeting">Good morning, Avi</div>
          <div class="date-line">Tuesday, 1 April 2026</div>
          <div class="stat-row">
            <div class="stat-pill">
              <div class="num">3</div>
              <div class="lbl">Today</div>
            </div>
            <div class="stat-pill">
              <div class="num">7</div>
              <div class="lbl">This Week</div>
            </div>
            <div class="stat-pill warn">
              <div class="num">2</div>
              <div class="lbl">Overdue</div>
            </div>
            <div class="stat-pill">
              <div class="num" style="color:#22c55e">&pound;4,200</div>
              <div class="lbl">Sent</div>
            </div>
          </div>
        </div>
      `);
      await addMsg('ai', `You have <strong>Sophie Williams</strong> at 10:00, then <strong>Liam Harris</strong> at 14:00, and the <strong>Wedding at Hampton Court</strong> tonight. Sophie and Jake's invoices are overdue — want me to send them a reminder?`, 300);
      await addMsg('ai', `<div class="suggest-chips">
        <button onclick="runDemo('overdue')">Show overdue invoices</button>
        <button onclick="runDemo('schedule')">Today's schedule</button>
        <button onclick="runDemo('earnings')">This month's earnings</button>
      </div>`, 100);
    }

    else if (type === 'earnings') {
      await addMsg('user', 'How much did I earn this month?');
      await showThinking(1200);
      await addMsg('ai', `<div class="label">Flowtone AI</div>Here's your March 2026 breakdown:`);
      await addMsg('ai', `
        <div class="rich-card money-card">
          <div class="period">March 2026 — Total Earned</div>
          <div class="amount">&pound;8,450</div>
          <div class="breakdown">
            <div class="item">
              <div class="val">&pound;4,800</div>
              <div class="lbl">Gigs</div>
            </div>
            <div class="item">
              <div class="val">&pound;2,350</div>
              <div class="lbl">Lessons</div>
            </div>
            <div class="item">
              <div class="val">&pound;1,300</div>
              <div class="lbl">Corporate</div>
            </div>
          </div>
          <div class="mini-chart">
            <div class="bar-group"><div class="bar" style="height:35px"></div><div class="bar-label">W1</div></div>
            <div class="bar-group"><div class="bar" style="height:55px"></div><div class="bar-label">W2</div></div>
            <div class="bar-group"><div class="bar" style="height:40px"></div><div class="bar-label">W3</div></div>
            <div class="bar-group"><div class="bar" style="height:60px"></div><div class="bar-label">W4</div></div>
          </div>
        </div>
      `, 200);
      await addMsg('ai', `That's <strong>12% up</strong> from February. Your biggest earner was the Goldman Sachs dinner (&pound;950). You still have &pound;3,245 outstanding across 4 invoices.`, 300);
    }

    else if (type === 'schedule') {
      await addMsg('user', "What's my day look like?");
      await showThinking(900);
      await addMsg('ai', `<div class="label">Flowtone AI</div>Here's today, Tuesday 1 April:`);
      await addMsg('ai', `
        <div class="rich-card schedule-card">
          <div class="event-row">
            <div class="time-col">10:00</div>
            <div class="dot" style="background:#6366f1"></div>
            <div class="event-info">
              <div class="event-title">Sophie Williams — Piano</div>
              <div class="event-sub">Home Studio</div>
            </div>
            <div class="event-fee">&pound;65</div>
          </div>
          <div class="event-row">
            <div class="time-col">14:00</div>
            <div class="dot" style="background:#6366f1"></div>
            <div class="event-info">
              <div class="event-title">Liam Harris — Guitar</div>
              <div class="event-sub">Home Studio</div>
            </div>
            <div class="event-fee">&pound;65</div>
          </div>
          <div class="event-row">
            <div class="time-col">17:30</div>
            <div class="dot" style="background:#f59e0b"></div>
            <div class="event-info">
              <div class="event-title">Wedding — Bennett</div>
              <div class="event-sub">Hampton Court Palace</div>
            </div>
            <div class="event-fee">&pound;2,200</div>
          </div>
        </div>
      `, 200);
      await addMsg('ai', `Big day — <strong>&pound;2,330</strong> total. The wedding is 40 min drive from home. Want me to set a reminder to leave at 4:30?`, 300);
    }

    else if (type === 'overdue') {
      await addMsg('user', 'Who owes me money?');
      await showThinking(1000);
      await addMsg('ai', `<div class="label">Flowtone AI</div>You have <strong>2 overdue invoices</strong> totalling <strong style="color:#fca5a5">&pound;195</strong>:`);
      await addMsg('ai', `
        <div class="rich-card overdue-card">
          <div class="header">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            <span class="text">Overdue Invoices</span>
          </div>
          <div class="overdue-row">
            <div>
              <div class="overdue-name">Sophie Williams — Piano (Mar)</div>
              <div class="overdue-days">4 days overdue</div>
            </div>
            <div class="overdue-amount">&pound;130</div>
          </div>
          <div class="overdue-row">
            <div>
              <div class="overdue-name">Jake Thompson — Piano (Mar)</div>
              <div class="overdue-days">2 days overdue</div>
            </div>
            <div class="overdue-amount">&pound;65</div>
          </div>
          <div class="action-row">
            <button class="action-btn primary">Send Payment Reminders</button>
          </div>
        </div>
      `, 200);
      await addMsg('ai', `Sophie's been late before — this is the 3rd time. Jake is usually on time, might just be an oversight. Want me to send a friendly nudge to both?`, 300);
    }

    else if (type === 'voice') {
      toggleVoice();
    }
  }

  // Auto-run the brief demo on load
  setTimeout(() => runDemo('brief'), 500);
</script>

</body>
</html>
