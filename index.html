<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <!-- App identity -->
    <title>Flow</title>
    <meta name="description" content="The musician's business OS — gigs, practice, clients and invoices." />

    <!-- Theme color (browser chrome on Android) -->
    <meta name="theme-color" content="#1e1b4b" />

    <!-- iOS home-screen PWA support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Flow" />
    <link rel="apple-touch-icon" href="/icon-192x192.svg" />

    <!-- Prevent phone number auto-detection -->
    <meta name="format-detection" content="telephone=no" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
